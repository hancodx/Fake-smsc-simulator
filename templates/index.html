<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fake SMSC Simulator</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <h1>📡 Fake SMSC Dashboard</h1>

        <div class="cards">

            <div class="card">
                <h2>Total</h2>
                <p id="total">0</p>
            </div>

            <div class="card delivered">
                <h2>Delivered</h2>
                <p id="delivered">0</p>
            </div>

            <div class="card failed">
                <h2>Failed</h2>
                <p id="failed">0</p>
            </div>

            <div class="card pending">
                <h2>Pending</h2>
                <p id="pending">0</p>
            </div>

        </div>

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>To</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Latency</th>
                    <th>Campaign</th>
                    <th>Created At</th>
                </tr>
            </thead>

            <tbody id="messagesTable">
            </tbody>

        </table>

    </div>

    <script src="/static/app.js"></script>

</body>

</html>
